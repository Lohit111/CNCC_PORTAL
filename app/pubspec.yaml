name: cncc_portal
description: Production-ready role-based ticket and equipment management system
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.1

  # Networking
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"
